<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocAnalyzer AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-bottom: 1px solid #334155;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header .logo { font-size: 1.6rem; }
    header h1 { font-size: 1.4rem; font-weight: 700; color: #f1f5f9; }
    header span { font-size: 0.8rem; color: #64748b; margin-left: 0.5rem; }

    /* ── Layout ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* ── Upload card ── */
    .upload-card {
      background: #1e293b;
      border: 2px dashed #334155;
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .upload-card:hover, .upload-card.drag-over {
      border-color: #6366f1;
      background: #1e2a3a;
    }
    .upload-card input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-icon { font-size: 3rem; margin-bottom: 1rem; }
    .upload-card h2 { font-size: 1.2rem; color: #cbd5e1; margin-bottom: 0.4rem; }
    .upload-card p  { font-size: 0.85rem; color: #64748b; }
    .file-badge {
      display: inline-block; margin-top: 1rem;
      background: #312e81; color: #a5b4fc;
      padding: 0.3rem 0.9rem; border-radius: 999px; font-size: 0.8rem;
    }

    /* ── Analyze button ── */
    .btn-analyze {
      display: block; width: 100%; margin-top: 1.25rem;
      padding: 0.85rem; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-analyze:hover { opacity: 0.88; }
    .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Loader ── */
    .loader {
      display: none; text-align: center; padding: 2rem;
      color: #94a3b8; font-size: 0.95rem;
    }
    .spinner {
      width: 40px; height: 40px; border: 4px solid #334155;
      border-top-color: #6366f1; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results grid ── */
    .results { display: none; margin-top: 2rem; }
    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .results-header h2 { font-size: 1.1rem; color: #f1f5f9; }
    .download-btns { display: flex; gap: 0.6rem; }
    .btn-dl {
      padding: 0.45rem 1rem; border-radius: 8px; border: 1px solid #334155;
      background: #1e293b; color: #94a3b8; font-size: 0.8rem;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .btn-dl:hover { background: #334155; color: #f1f5f9; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 12px; padding: 1.25rem;
    }
    .card-title {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: #64748b; margin-bottom: 0.75rem;
      display: flex; align-items: center; gap: 0.4rem;
    }

    /* ── Summary ── */
    .summary-text { font-size: 0.95rem; line-height: 1.7; color: #cbd5e1; }

    /* ── Sentiment badge ── */
    .sentiment-wrap { display: flex; align-items: center; gap: 1rem; }
    .sentiment-badge {
      padding: 0.5rem 1.4rem; border-radius: 999px;
      font-size: 1rem; font-weight: 700; text-transform: capitalize;
    }
    .sentiment-positive { background: #14532d; color: #4ade80; }
    .sentiment-negative { background: #450a0a; color: #f87171; }
    .sentiment-neutral  { background: #1e3a5f; color: #60a5fa; }
    .sentiment-bar { flex: 1; height: 8px; background: #334155; border-radius: 999px; overflow: hidden; }
    .sentiment-fill { height: 100%; border-radius: 999px; transition: width 0.6s ease; }

    /* ── Entities ── */
    .entity-group { margin-bottom: 0.9rem; }
    .entity-label {
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 0.4rem;
    }
    .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .tag {
      padding: 0.25rem 0.7rem; border-radius: 6px;
      font-size: 0.8rem; font-weight: 500;
    }
    .tag-people       { background: #312e81; color: #a5b4fc; }
    .tag-organizations{ background: #1e3a5f; color: #7dd3fc; }
    .tag-locations    { background: #14532d; color: #86efac; }
    .tag-dates        { background: #451a03; color: #fdba74; }
    .tag-money        { background: #1a2e05; color: #a3e635; }
    .empty-tag        { color: #475569; font-size: 0.8rem; font-style: italic; }

    /* ── Highlighted text ── */
    .text-card { grid-column: 1 / -1; }
    .highlighted-text {
      font-size: 0.88rem; line-height: 1.8; color: #94a3b8;
      max-height: 280px; overflow-y: auto;
      background: #0f1117; border-radius: 8px; padding: 1rem;
      white-space: pre-wrap; word-break: break-word;
    }
    .highlighted-text::-webkit-scrollbar { width: 6px; }
    .highlighted-text::-webkit-scrollbar-track { background: #1e293b; }
    .highlighted-text::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    mark.hl-people        { background: #312e81; color: #a5b4fc; border-radius: 3px; padding: 0 2px; }
    mark.hl-organizations { background: #1e3a5f; color: #7dd3fc; border-radius: 3px; padding: 0 2px; }
    mark.hl-locations     { background: #14532d; color: #86efac; border-radius: 3px; padding: 0 2px; }
    mark.hl-dates         { background: #451a03; color: #fdba74; border-radius: 3px; padding: 0 2px; }
    mark.hl-money         { background: #1a2e05; color: #a3e635; border-radius: 3px; padding: 0 2px; }

    /* ── Error ── */
    .error-box {
      display: none; background: #450a0a; border: 1px solid #7f1d1d;
      border-radius: 10px; padding: 1rem 1.25rem; margin-top: 1rem;
      color: #fca5a5; font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🧠</span>
  <h1>DocAnalyzer AI <span>v1.0</span></h1>
</header>

<div class="container">

  <!-- Upload -->
  <div class="upload-card" id="dropZone" style="margin-top:0.75rem">
    <input type="file" id="fileInput" accept=".pdf,.docx,.png,.jpg,.jpeg,.tiff,.bmp,.webp" />
    <div class="upload-icon">📄</div>
    <h2>Drop your document here</h2>
    <p>Supports PDF, DOCX, PNG, JPG, TIFF</p>
    <div class="file-badge" id="fileBadge" style="display:none"></div>
  </div>

  <button class="btn-analyze" id="analyzeBtn" disabled>Analyze Document</button>
  <div class="error-box" id="errorBox"></div>

  <!-- Loader -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
    Running AI analysis… this may take a moment on first run.
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-header">
      <h2>Analysis Results</h2>
      <div class="download-btns">
        <button class="btn-dl" id="dlJson">⬇ Download JSON</button>
        <button class="btn-dl" id="dlPdf">⬇ Download PDF Report</button>
      </div>
    </div>

    <div class="grid">

      <!-- Summary -->
      <div class="card">
        <div class="card-title">📝 Summary</div>
        <p class="summary-text" id="summaryText"></p>
      </div>

      <!-- Sentiment -->
      <div class="card">
        <div class="card-title">💬 Sentiment</div>
        <div class="sentiment-wrap">
          <span class="sentiment-badge" id="sentimentBadge"></span>
          <div class="sentiment-bar">
            <div class="sentiment-fill" id="sentimentFill"></div>
          </div>
        </div>
      </div>

      <!-- Entities -->
      <div class="card" style="grid-column: 1 / -1">
        <div class="card-title">🏷 Extracted Entities</div>
        <div id="entitiesContainer"></div>
      </div>

      <!-- Highlighted text -->
      <div class="card text-card">
        <div class="card-title">🔍 Document Text (with highlights)</div>
        <div class="highlighted-text" id="highlightedText"></div>
      </div>

    </div>
  </div>
</div>

<script>
  const fileInput   = document.getElementById('fileInput');
  const dropZone    = document.getElementById('dropZone');
  const fileBadge   = document.getElementById('fileBadge');
  const analyzeBtn  = document.getElementById('analyzeBtn');
  const loader      = document.getElementById('loader');
  const results     = document.getElementById('results');
  const errorBox    = document.getElementById('errorBox');

  let selectedFile = null;
  let lastResult   = null;

  // ── File selection ──────────────────────────────────────────────────────
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) setFile(fileInput.files[0]);
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });

  function setFile(f) {
    selectedFile = f;
    fileBadge.textContent = `📎 ${f.name}  (${(f.size / 1024).toFixed(1)} KB)`;
    fileBadge.style.display = 'inline-block';
    analyzeBtn.disabled = false;
    results.style.display = 'none';
    errorBox.style.display = 'none';
  }

  // ── Analyze ─────────────────────────────────────────────────────────────
  analyzeBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    analyzeBtn.disabled = true;
    loader.style.display = 'block';
    results.style.display = 'none';
    errorBox.style.display = 'none';

    const form = new FormData();
    form.append('file', selectedFile);

    try {
      const res = await fetch('/analyze', { method: 'POST', body: form });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Analysis failed');
      }
      lastResult = await res.json();
      renderResults(lastResult);
    } catch (e) {
      errorBox.textContent = '❌ ' + e.message;
      errorBox.style.display = 'block';
    } finally {
      loader.style.display = 'none';
      analyzeBtn.disabled = false;
    }
  });

  // ── Render ───────────────────────────────────────────────────────────────
  function renderResults(data) {
    // Summary
    document.getElementById('summaryText').textContent = data.summary || '—';

    // Sentiment
    const badge = document.getElementById('sentimentBadge');
    const fill  = document.getElementById('sentimentFill');
    const s = (data.sentiment || 'neutral').toLowerCase();
    badge.textContent = s;
    badge.className = `sentiment-badge sentiment-${s}`;
    const colors = { positive: '#4ade80', negative: '#f87171', neutral: '#60a5fa' };
    const widths = { positive: '80%', negative: '75%', neutral: '50%' };
    fill.style.background = colors[s] || '#60a5fa';
    fill.style.width = widths[s] || '50%';

    // Entities
    const ec = document.getElementById('entitiesContainer');
    ec.innerHTML = '';
    const groups = [
      { key: 'people',        label: 'People',        cls: 'tag-people' },
      { key: 'organizations', label: 'Organizations', cls: 'tag-organizations' },
      { key: 'locations',     label: 'Locations',     cls: 'tag-locations' },
      { key: 'dates',         label: 'Dates',         cls: 'tag-dates' },
      { key: 'money',         label: 'Money',         cls: 'tag-money' },
    ];
    groups.forEach(({ key, label, cls }) => {
      const items = data.entities?.[key] || [];
      const div = document.createElement('div');
      div.className = 'entity-group';
      div.innerHTML = `<div class="entity-label" style="color:var(--c)">${label}</div>
        <div class="tags">${
          items.length
            ? items.map(i => `<span class="tag ${cls}">${escHtml(i)}</span>`).join('')
            : '<span class="empty-tag">None detected</span>'
        }</div>`;
      ec.appendChild(div);
    });

    // Highlighted text
    const rawText = data.text || '';
    document.getElementById('highlightedText').innerHTML = highlightEntities(rawText, data.entities || {});

    results.style.display = 'block';
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── Entity highlighting ──────────────────────────────────────────────────
  function highlightEntities(text, entities) {
    const clsMap = {
      people: 'hl-people', organizations: 'hl-organizations',
      locations: 'hl-locations', dates: 'hl-dates', money: 'hl-money',
    };
    // Build sorted list of (term, class) by length desc to avoid partial replacements
    const terms = [];
    Object.entries(entities).forEach(([key, vals]) => {
      (vals || []).forEach(v => {
        if (v && v.trim()) terms.push({ term: v.trim(), cls: clsMap[key] || '' });
      });
    });
    terms.sort((a, b) => b.term.length - a.term.length);

    let escaped = escHtml(text);
    terms.forEach(({ term, cls }) => {
      if (!cls) return;
      const safe = escHtml(term).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      escaped = escaped.replace(
        new RegExp(`(?<![\\w>])(${safe})(?![\\w<])`, 'g'),
        `<mark class="${cls}">$1</mark>`
      );
    });
    return escaped;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── Downloads ────────────────────────────────────────────────────────────
  document.getElementById('dlJson').addEventListener('click', () => {
    if (!lastResult) return;
    const blob = new Blob([JSON.stringify(lastResult, null, 2)], { type: 'application/json' });
    triggerDownload(blob, 'analysis_result.json');
  });

  document.getElementById('dlPdf').addEventListener('click', () => {
    if (!lastResult) return;
    // Build a simple printable HTML and open print dialog
    const win = window.open('', '_blank');
    win.document.write(buildPdfHtml(lastResult));
    win.document.close();
    win.focus();
    setTimeout(() => win.print(), 500);
  });

  function buildPdfHtml(data) {
    const s = data.sentiment || 'neutral';
    const ents = data.entities || {};
    const rows = ['people','organizations','locations','dates','money']
      .map(k => `<tr><td><b>${k}</b></td><td>${(ents[k]||[]).join(', ') || '—'}</td></tr>`)
      .join('');
    return `<!DOCTYPE html><html><head><meta charset="UTF-8">
      <title>Analysis Report</title>
      <style>
        body{font-family:sans-serif;padding:2rem;color:#111}
        h1{color:#4f46e5}h2{margin-top:1.5rem;color:#374151}
        table{border-collapse:collapse;width:100%}
        td,th{border:1px solid #d1d5db;padding:0.5rem 0.75rem;text-align:left}
        .badge{display:inline-block;padding:0.3rem 1rem;border-radius:999px;font-weight:700;
          background:${s==='positive'?'#dcfce7':s==='negative'?'#fee2e2':'#dbeafe'};
          color:${s==='positive'?'#166534':s==='negative'?'#991b1b':'#1e40af'}}
      </style></head><body>
      <h1>📄 Document Analysis Report</h1>
      <h2>Summary</h2><p>${escHtml(data.summary||'')}</p>
      <h2>Sentiment</h2><span class="badge">${s}</span>
      <h2>Entities</h2>
      <table><tr><th>Type</th><th>Values</th></tr>${rows}</table>
      </body></html>`;
  }

  function triggerDownload(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }
</script>
</body>
</html>
